<!-- Bottom-right toast stack -->
<div
  class="fixed bottom-5 right-5 z-50 flex flex-col gap-2 cursor-pointer"
  (click)="goToNotifications()"
>
  @for (toast of toastService.toasts(); track toast.id) {
    <div
      class="flex items-start gap-3 px-4 py-6 rounded-2xl shadow-md bg-[#f1f3f7] pointer-events-auto w-[380px]"
    >
      <!-- Type icon -->
      <div
        class="w-7 h-7 rounded-lg flex items-center justify-center shrink-0 [&_svg]:w-3.5 [&_svg]:h-3.5 mt-0.5"
        [class]="getIconStyle(toast.type)"
        [innerHTML]="getIcon(toast.type)"
      ></div>

      <!-- Content -->
      <div class="flex-1 min-w-0">
        <p class="text-[10px] font-bold tracking-widest uppercase text-slate-500 mb-0.5">
          {{ toast.type.replace('_', ' ') }}
        </p>
        <p class="font-semibold text-slate-800 text-[13px] leading-snug">{{ toast.title }}</p>
        <p class="text-slate-400 text-[12px] leading-snug mt-0.5 line-clamp-2">
          {{ toast.message }}
        </p>
      </div>

      <!-- Dismiss -->
      <button
        (click)="toastService.dismiss(toast.id)"
        class="shrink-0 text-slate-600 hover:text-slate-400 transition-colors mt-0.5"
      >
        <svg class="w-3.5 h-3.5" viewBox="0 0 20 20" fill="currentColor">
          <path
            fill-rule="evenodd"
            d="M4.293 4.293a1 1 0 011.414 0L10 8.586l4.293-4.293a1 1 0 111.414 1.414L11.414 10l4.293 4.293a1 1 0 01-1.414 1.414L10 11.414l-4.293 4.293a1 1 0 01-1.414-1.414L8.586 10 4.293 5.707a1 1 0 010-1.414z"
            clip-rule="evenodd"
          />
        </svg>
      </button>
    </div>
  }
</div>
