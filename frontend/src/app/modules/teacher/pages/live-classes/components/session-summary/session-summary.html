<!-- Schedule-Class-Page Session Summary Component -->

<div class="bg-white border border-gray-200 rounded-xl p-6">
  <!-- TITLE -->
  <h2 class="text-lg font-semibold text-gray-800 mb-5">Session Summary</h2>

  <!-- SUMMARY ITEMS -->
  <div class="flex flex-col gap-3 text-sm text-gray-700">
    @for (item of summaryItems; track item.label) {
    <div class="flex justify-between">
      <span>{{ item.label }}</span>
      <span class="font-medium break-words">
        {{ item.value }}
      </span>
    </div>
    }
  </div>

  <!-- BUTTON -->
  <button (click)="confirmSchedule()" 
    class="mt-6 w-full bg-blue-600 text-white py-2.5 rounded-lg text-sm font-medium disabled:bg-gray-300 disabled:cursor-not-allowed"
    [disabled]="!isFormValid">
    {{ editId ? 'Save Changes' : 'Confirm Schedule' }}
  </button>
</div>
