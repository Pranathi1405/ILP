<!-- Schedule Class Page -->

<div class="flex bg-gray-50 min-h-screen">
  
  <!-- MAIN CONTENT -->
  <div class="flex-1 p-6">
    <!-- BACK BUTTON -->
    <div class="mt-4">
      <button (click)="goBack()" class="flex items-center gap-2 text-gray-700 hover:text-black">
        <span class="w-8 h-8 rounded-full border flex items-center justify-center hover:bg-gray-100">
          ←
        </span>
        <p class="text-sm font-medium">Back</p>
      </button>
    </div>

    <!-- GRID LAYOUT -->
    <div class="grid grid-cols-1 lg:grid-cols-3 gap-6 mt-6">

      <!-- LEFT SECTION -->
      <div class="col-span-2 flex flex-col gap-6">
        <app-session-details [session]="selectedSession"></app-session-details>
        <!-- <app-interactive-features></app-interactive-features> -->
        <app-checklist-card></app-checklist-card>
      </div>

      <!-- RIGHT SECTION -->
      <div class="flex flex-col gap-6 lg:sticky lg:top-6 h-fit">
        <app-session-summary [editId]="editId" ></app-session-summary>
      </div>
    </div>
  </div>
</div>
