<!-- Author: E.Kaeith Emmanuel | INTEGER — Whole numbers only -->
<div class="space-y-4">
  <p
    class="text-[11px] font-bold uppercase tracking-widest text-indigo-500 mb-5 flex items-center gap-2"
  >
    <span class="inline-block w-2 h-2 rounded-full bg-indigo-500"></span>
    Integer Type Answer
  </p>

  <!-- Display screen -->
  <div
    class="w-full bg-gray-900 rounded-2xl px-6 py-5 flex items-center justify-between shadow-inner select-none"
  >
    <span class="font-mono text-3xl font-bold tracking-widest text-green-400 min-w-[1.5rem]">
      {{ display || '—' }}
    </span>
    <button
      type="button"
      (click)="backspace()"
      class="text-gray-400 hover:text-white px-3 py-1 rounded-lg hover:bg-gray-700 transition text-lg outline-none"
    >
      ⌫
    </button>
  </div>

  <!-- Keypad grid -->
  <div class="grid grid-cols-3 gap-3">
    @for (d of digits; track d) {
      <button
        type="button"
        (click)="pressDigit(d)"
        class="h-14 rounded-xl bg-indigo-50 hover:bg-indigo-100 hover:text-indigo-700 text-gray-800 font-semibold text-lg transition-all duration-150 active:scale-95 shadow-sm outline-none focus-visible:ring-2 focus-visible:ring-indigo-400"
      >
        {{ d }}
      </button>
    }
  </div>

  <!-- Bottom row: sign toggle + spacer + clear -->
  <div class="grid grid-cols-3 gap-3">
    <button
      type="button"
      (click)="toggleSign()"
      class="h-12 rounded-xl bg-yellow-100 hover:bg-yellow-200 text-yellow-700 font-semibold text-base transition-all active:scale-95 shadow-sm outline-none"
    >
      ±
    </button>
    <div></div>
    <!-- spacer -->
    <button
      type="button"
      (click)="clear()"
      class="h-12 rounded-xl bg-red-100 hover:bg-red-200 text-red-600 font-semibold text-sm transition-all active:scale-95 shadow-sm outline-none"
    >
      CLEAR
    </button>
  </div>

  <!-- Hint -->
  <div
    class="bg-indigo-50 border border-indigo-200 rounded-xl px-4 py-3 text-[12px] text-indigo-700 flex items-start gap-2"
  >
    <span>ℹ️</span>
    <span>Integers only — no fractions or decimals. No negative marking.</span>
  </div>
</div>
