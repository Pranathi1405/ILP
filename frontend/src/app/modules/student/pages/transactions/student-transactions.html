<div class="min-h-screen bg-[#F8FAFC]">
  <!-- Page header -->
  <div class="px-8 py-5 bg-[#F8FAFC] border-b border-slate-200">
    <h1 class="text-lg lg:text-3xl font-black text-slate-800 leading-tight tracking-tight">
      Transactions
    </h1>
    <p
      class="text-[10px] lg:text-sm font-semibold tracking-[0.18em] text-slate-400 mt-0.5 uppercase"
    >
      Payments &amp; Course Purchases
    </p>
  </div>

  <!-- Tab selector + content card -->
  <div class="px-8 py-6">
    <div class="bg-white rounded-xl border border-slate-100 shadow-sm overflow-hidden">
      <!-- Selector -->
      <div class="px-6 pt-4">
        <app-transactions-selector
          [activeTab]="activeTab()"
          (activeTabChange)="onTabChange($event)"
        />
      </div>

      <!-- Child route content -->
      <div class="px-6 pb-6 pt-2">
        <router-outlet />
      </div>
    </div>
  </div>
</div>
