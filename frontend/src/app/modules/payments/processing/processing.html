<!-- Processing Page — full screen centered -->
<div class="min-h-screen bg-[#F8FAFC] flex items-center justify-center p-6">
  <div
    class="bg-white border border-slate-200 rounded-3xl shadow-xl w-full max-w-md p-10 flex flex-col items-center text-center"
  >
    <!-- Animated lock icon -->
    <div class="relative mb-8">
      <!-- Spinning arc -->
      <svg
        class="animate-spin absolute -top-3 -left-3 w-[88px] h-[88px] text-blue-500"
        viewBox="0 0 88 88"
        fill="none"
      >
        <circle
          cx="44"
          cy="44"
          r="40"
          stroke="currentColor"
          stroke-width="3"
          stroke-dasharray="60 190"
          stroke-linecap="round"
        />
      </svg>
      <!-- Lock -->
      <div
        class="w-16 h-16 rounded-full bg-slate-50 border border-slate-200 flex items-center justify-center"
      >
        <svg width="28" height="32" viewBox="0 0 28 32" fill="none">
          <rect x="2" y="14" width="24" height="16" rx="3" fill="#CBD5E1" />
          <path
            d="M7 14V10C7 6.68629 10.134 4 14 4C17.866 4 21 6.68629 21 10V14"
            stroke="#94A3B8"
            stroke-width="2.5"
            stroke-linecap="round"
          />
          <circle cx="14" cy="22" r="2.5" fill="#94A3B8" />
          <line
            x1="14"
            y1="24.5"
            x2="14"
            y2="27"
            stroke="#94A3B8"
            stroke-width="2"
            stroke-linecap="round"
          />
        </svg>
      </div>
    </div>

    <h2 class="text-xl font-black text-slate-800 mb-2">Processing your payment…</h2>
    <p class="text-sm text-slate-400 font-medium leading-relaxed mb-10 max-w-xs">
      Please do not refresh or close this window while we secure your enrollment.
    </p>

    <!-- Progress bar -->
    <div class="w-full">
      <div class="h-1.5 bg-slate-100 rounded-full overflow-hidden mb-3">
        <div
          class="h-full bg-blue-600 rounded-full transition-all duration-300"
          [style.width.%]="progress()"
        ></div>
      </div>
      <div class="flex justify-between items-center">
        <span class="text-[10px] font-bold text-slate-400 uppercase tracking-[2px]">
          {{ statusLabel() }}
        </span>
        <span class="text-[11px] font-black text-blue-600">{{ progress() }}%</span>
      </div>
    </div>
  </div>
</div>
