<section class="bg-[#dde8f8] py-14 px-6 flex flex-col items-center">
  <h2 class="text-2xl font-bold italic bg-linear-to-br from-amber-600 to-amber-700 bg-clip-text text-transparent text-center mb-2 tracking-wide">
    What Our Users Say
  </h2>
  <div class="flex items-center gap-1 mb-8">
    <span class="w-2 h-2 rounded-full bg-blue-500"></span>
    <span class="w-6 h-2 rounded bg-blue-500"></span>
    <span class="w-2 h-2 rounded-full bg-blue-500"></span>
  </div>
  <div class="bg-white rounded-2xl px-10 py-9 max-w-[540px] w-full shadow-[0_2px_16px_rgba(74,144,217,0.12)] text-center mb-6">
    <div class="text-[4rem] leading-none text-blue-500 opacity-75 font-serif mb-2">
      "
    </div>
    <p class="text-[0.92rem] leading-7 text-gray-800 mb-6">
      "{{ testimonials[activeIndex].text }}"
    </p>
    <div class="flex flex-col items-center gap-2">
      <img
        [src]="testimonials[activeIndex].avatar"
        [alt]="testimonials[activeIndex].name"
        class="w-11 h-11 rounded-full object-cover border-2 border-blue-100"
      />
      <span class="text-xs font-semibold text-blue-500 tracking-wide">
        {{ testimonials[activeIndex].role }}
      </span>
    </div>

  </div>
  <div class="flex items-center justify-between gap-5 max-w-[540px] w-full">
    <button
      class="text-[0.72rem] font-semibold text-gray-600 tracking-wider hover:text-blue-500 transition"
      (click)="prev()">
      ← PREVIOUS
    </button>
    <div class="flex items-center gap-1">
      @for (t of testimonials; track t; let i = $index) {
        <span
          class="h-[5px] rounded cursor-pointer transition-all duration-300"
          [ngClass]="i === activeIndex 
            ? 'w-9 bg-blue-800' 
            : 'w-5 bg-blue-200'"
          (click)="goTo(i)">
        </span>
      }
    </div>
    <button
      class="text-[0.72rem] font-semibold text-gray-600 tracking-wider hover:text-blue-500 transition"
      (click)="next()">
      NEXT →
    </button>
  </div>
</section>
<section class="bg-[#17b9e8] rounded-xl mx-40 px-10 py-10 flex  items-center justify-between text-center gap-6">
  <div>
    <h3 class="text-white text-xl font-bold mb-2">
      Ready to start your journey?
    </h3>
    <p class="text-white/90 text-sm max-w-md leading-relaxed">
      Subscribe to our newsletter for the latest updates and special offers.
    </p>
  </div>

  <div class="flex flex-wrap items-center justify-center gap-3">
    <input
      type="email"
      placeholder="Enter your email"
      [(ngModel)]="email"
      class="h-10 px-4 min-w-[220px] text-sm 
             rounded-md bg-white text-gray-800 
             placeholder-gray-400 outline-none"
    />
    <button
      (click)="register()"
      class="h-10 px-6 text-sm font-semibold 
             bg-[#1a2040] text-white rounded-md 
             hover:bg-[#263060] transition-colors duration-200">
      Register Now
    </button>
  </div>
</section>
