<section class="bg-white py-20 px-6 lg:px-20">
  <div class="max-w-7xl mx-auto">
    <div class="flex flex-col md:flex-row md:items-end md:justify-between mb-10 gap-6">
      <div>
        <h2 class="text-3xl lg:text-4xl font-bold mb-3">
          Watch Free Trial Classes
        </h2>
        <p class="text-gray-600 max-w-md">
          Experience our teaching methodology before you commit.
        </p>
      </div>
      <div class="flex gap-3">
        <button (click)="prev()"
          class="w-11 h-11 border border-gray-300 flex items-center justify-center text-gray-600 hover:border-blue-600 hover:text-blue-600 hover:bg-blue-50 transition rounded-pill">
          ←
        </button>
        <button (click)="next()"
          class="w-11 h-11  border border-gray-300 flex items-center justify-center text-gray-600 hover:border-blue-600 hover:text-blue-600 hover:bg-blue-50 transition rounded-pill">
          →
        </button>
      </div>
    </div>
    <div class="grid sm:grid-cols-2 lg:grid-cols-4 gap-6">
      @for (course of visibleCourses; track course.name) {
        <div class="bg-white border border-gray-200 rounded-2xl overflow-hidden hover:-translate-y-1 hover:shadow-lg hover:border-blue-200 transition duration-300 cursor-pointer">
          <div class="relative aspect-video flex items-center justify-center text-4xl"
               [ngClass]="course.bg">
            <span class="absolute top-3 left-3 bg-blue-600 text-white text-xs font-bold px-2 py-1 rounded">
              FREE TRIAL
            </span>
            <img [src]="course.icon" class="w-full h-full object-cover" />
          </div>
          <div class="p-4">
           <h3 class="font-semibold text-sm mb-1 leading-snug">
              {{ course.name }}
            </h3>
            <p class="text-xs text-gray-400 mb-2">
              {{ course.author }}
            </p>
            <div class="text-yellow-500 text-xs">
              ★★★★★
              <span class="text-gray-400 ml-1">{{ course.rating }}</span>
            </div>
            <div class="flex gap-4 text-xs text-gray-400 mt-2">
              <span class="flex items-center gap-1">🕐 {{ course.hours }}</span>
              <span class="flex items-center gap-1">📖 {{ course.lectures }}</span>
            </div>
          </div>
          <div class="flex justify-between items-center px-4 py-3 border-t border-gray-200">
            <span class="font-bold text-blue-600">
              {{ course.price }}
            </span>
            <button
              class="w-8 h-8 rounded-lg border border-gray-300 flex items-center justify-center hover:border-blue-600 hover:bg-blue-50 transition">
              🛒
            </button>
          </div>
        </div>
      }
    </div>
  </div>
</section>
