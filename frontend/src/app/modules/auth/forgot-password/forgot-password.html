<div
  class="min-h-screen flex items-center justify-center bg-linear-to-br from-gray-100 via-blue-50 to-indigo-100 px-6"
>
  <a routerLink="/" class="absolute top-3 left-3">
    <img src="image.png" class="h-10 m-auto" />
  </a>
  <div class="flex flex-col md:flex-row items-center gap-12 w-full max-w-6xl">
    <div class="bg-white shadow-xl rounded-3xl w-full max-w-md p-10">
      <!-- HEADER -->
      <div class="text-center mb-6">
        <img
          src="/icons/icon.svg"
          class="w-36 mx-auto mb-4 hover:scale-105 transition"
          alt="Logo"
        />

        <h4 class="text-2xl font-bold text-gray-800 mb-2">Forgot Password?</h4>

        <p class="text-sm text-gray-500">Enter your email and we'll send you a reset link</p>
      </div>

      <!-- FORM -->
      <form [formGroup]="forgotform" (ngSubmit)="Onsubmit()" class="space-y-5">
        <div>
          <label class="text-sm font-medium text-gray-700 mb-1 block"> Email Address </label>

          <input
            type="email"
            formControlName="email"
            placeholder="Enter your email"
            class="w-full px-4 py-3 border border-gray-200 rounded-xl bg-gray-50 focus:outline-none focus:ring-2 focus:ring-cyan-400 focus:border-cyan-400 transition"
          />

          @if (forgotform.get('email')?.touched && forgotform.get('email')?.errors) {
            @if (forgotform.get('email')?.errors?.['required']) {
              <p class="text-red-500 text-xs mt-1">Email is required</p>
            }
          }
        </div>

        <!-- BUTTON -->
        <button
          class="w-full py-3 rounded-xl text-white font-semibold bg-cyan-500 hover:bg-cyan-600 shadow-md hover:shadow-lg transition"
        >
          Send Reset Link
        </button>
      </form>

      <!-- BACK -->
      <div class="text-center mt-6">
        <a
          [routerLink]="['/login']"
          class="text-sm text-gray-500 hover:text-cyan-500 hover:underline transition"
        >
          ← Back to Login
        </a>
      </div>
    </div>

    <!-- RIGHT IMAGE -->
    <div class="flex justify-center">
      <img src="mfa.png" class="h-150 w-250" alt="Security Illustration" />
    </div>
  </div>
</div>
