<div class="p-8 bg-[#f7f8fc] min-h-screen">
  <!-- HEADER -->
  <div class="mb-8">
    <h2 class="text-[22px] font-semibold text-gray-800">MY COURSES</h2>

    <div class="flex gap-6 text-[13px] mt-2">
      <span
        (click)="setTab('courses')"
        [class.text-blue-500]="activeTab === 'courses'"
        class="cursor-pointer text-gray-400 pb-1"
      >
        <strong>COURSES</strong>
      </span>

      <span
        (click)="setTab('upcoming')"
        [class.text-blue-500]="activeTab === 'upcoming'"
        class="cursor-pointer text-gray-400 pb-1"
      >
        <strong>UPCOMING Classes</strong>
      </span>

      <span
        (click)="setTab('completed')"
        [class.text-blue-500]="activeTab === 'completed'"
        class="cursor-pointer text-gray-400 pb-1"
      >
        <strong>COMPLETED</strong>
      </span>
    </div>
  </div>

  <!-- COURSES -->
  <div *ngIf="activeTab === 'courses'">
    <div *ngIf="isLoadingCourses">Loading...</div>

    <div
      *ngIf="!isLoadingCourses && enrolledCourses.length > 0"
      class="grid md:grid-cols-2 xl:grid-cols-3 gap-6"
    >
      <div
        *ngFor="let course of enrolledCourses"
        class="bg-white rounded-3xl shadow-lg overflow-hidden"
      >
        <img
          [src]="course.thumbnail_url || 'https://via.placeholder.com/640x360'"
          class="w-full h-48 object-cover"
        />
        <div class="p-6">
          <h3 class="text-lg font-semibold">{{ course.course_name }}</h3>
          <p class="text-sm text-gray-500 mb-4">BY {{ course.teacherNames }}</p>
          <button
            (click)="continueLearning(course)"
            class="w-full bg-black text-white py-2 rounded"
          >
            CONTINUE
          </button>
        </div>
      </div>
    </div>

    <div *ngIf="!isLoadingCourses && enrolledCourses.length === 0">No courses</div>
  </div>

  <!-- UPCOMING -->
  <div *ngIf="activeTab === 'upcoming'">
    <div *ngIf="isLoadingUpcoming">Loading...</div>

    <div
      *ngIf="!isLoadingUpcoming && upcomingClasses.length > 0"
      class="grid sm:grid-cols-2 lg:grid-cols-3 xl:grid-cols-4 gap-6"
    >
      <div *ngFor="let cls of upcomingClasses" class="bg-white p-5 rounded-xl">
        {{ cls.title }}
      </div>
    </div>

    <div *ngIf="!isLoadingUpcoming && upcomingClasses.length === 0">No upcoming classes</div>
  </div>

  <!-- COMPLETED -->
  <div *ngIf="activeTab === 'completed'">
    <div *ngIf="isLoadingPast">Loading...</div>

    <div
      *ngIf="!isLoadingPast && pastClasses.length > 0"
      class="grid sm:grid-cols-2 lg:grid-cols-3 xl:grid-cols-4 gap-6"
    >
      <div *ngFor="let cls of pastClasses" class="bg-white p-5 rounded-xl">
        {{ cls.title }}
      </div>
    </div>

    <div *ngIf="!isLoadingPast && pastClasses.length === 0">No completed classes</div>
  </div>
</div>
