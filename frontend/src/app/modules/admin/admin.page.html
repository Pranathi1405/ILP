<div class="flex h-screen bg-slate-50 overflow-hidden">
  <!-- Sidebar -->
  <app-admin-side-panel />

  <!-- Main content area -->
  <div class="flex flex-col flex-1 overflow-hidden">
    <!-- Top bar -->
    <header
      class="flex items-center justify-between px-8 py-4 bg-white border-b border-slate-100 shrink-0"
    >
      <p class="text-lg font-semibold text-slate-700">{{ greeting() }}!</p>

      <div class="flex items-center gap-3">
        <!-- Bell -->
        <button
          (click)="goToNotifications()"
          class="flex items-center justify-center w-9 h-9 rounded-lg text-slate-400 hover:bg-slate-100 transition-colors relative"
        >
          <svg
            width="17"
            height="20"
            viewBox="0 0 17 20"
            fill="none"
            xmlns="http://www.w3.org/2000/svg"
          >
            <path
              d="M8.01562 19.5C9.09375 19.5 10.0312 18.6094 10.0312 17.5312H6C6 18.6094 6.9375 19.5 8.01562 19.5ZM14.0156 13.5V8.53125C14.0156 5.4375 12.375 2.85938 9.51562 2.20312V1.5C9.51562 0.703125 8.85938 0 8.01562 0C7.17188 0 6.51562 0.703125 6.51562 1.5V2.20312C3.65625 2.85938 2.01562 5.4375 2.01562 8.53125V13.5L0 15.5156V16.5H16.0312V15.5156L14.0156 13.5ZM12 14.5312H4.03125V8.53125C4.03125 6.04688 5.53125 4.03125 8.01562 4.03125C10.5 4.03125 12 6.04688 12 8.53125V14.5312Z"
              fill="#64748B"
            />
            @if (notificationsService.unreadCount() > 0) {
              <rect
                x="9"
                y="1"
                width="6"
                height="6"
                rx="3"
                fill="#1A5FF8"
                stroke="white"
                stroke-width="2"
              />
            }
          </svg>
        </button>

        <!-- Avatar -->
        <div class="w-9 h-9 rounded-full bg-slate-200 overflow-hidden">
          <svg class="w-full h-full text-slate-400" viewBox="0 0 24 24" fill="currentColor">
            <path
              d="M12 12c2.7 0 4.8-2.1 4.8-4.8S14.7 2.4 12 2.4 7.2 4.5 7.2 7.2 9.3 12 12 12zm0 2.4c-3.2 0-9.6 1.6-9.6 4.8v2.4h19.2v-2.4c0-3.2-6.4-4.8-9.6-4.8z"
            />
          </svg>
        </div>
      </div>
    </header>

    <!-- Routed page content -->
    <main class="flex-1 overflow-y-auto p-8">
      <router-outlet />
    </main>
  </div>
</div>

<!-- Global notification toasts — rendered outside the scroll container -->
<app-toast />
