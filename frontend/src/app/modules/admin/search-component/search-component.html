<div class="flex items-center gap-2 px-3 py-2 bg-slate-50 rounded-lg border border-slate-200 w-72">
  <svg
    class="w-4 h-4 text-slate-400 shrink-0"
    viewBox="0 0 24 24"
    fill="none"
    stroke="currentColor"
    stroke-width="1.8"
    stroke-linecap="round"
    stroke-linejoin="round"
  >
    <circle cx="11" cy="11" r="8" />
    <path d="m21 21-4.35-4.35" />
  </svg>
  <input
    type="text"
    [placeholder]="placeholder()"
    [value]="value()"
    (input)="onInput($event)"
    class="bg-transparent text-sm text-slate-600 placeholder-slate-400 outline-none w-full"
  />
</div>
