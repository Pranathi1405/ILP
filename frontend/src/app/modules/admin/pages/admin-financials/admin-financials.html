<section class="min-h-full bg-slate-50 p-6 max-[899px]:p-4">
  <header class="mb-6 flex flex-wrap items-start justify-between gap-4">
    <div>
      <h1 class="text-lg lg:text-3xl font-black text-slate-800 leading-tight tracking-tight">
        Finance Dashboard
      </h1>
      <p
        class="text-[10px] lg:text-sm font-semibold tracking-[0.18em] text-slate-400 mt-0.5 uppercase"
      >
        Revenue, transactions & payment insights
      </p>
    </div>

    <div class="rounded-[20px] border border-slate-200/80 bg-white/90 p-1.5 shadow-[0_18px_45px_rgba(15,23,42,0.08)]">
      <div class="flex flex-wrap gap-1">
        @for (option of periodOptions; track option.value) {
          <button
            type="button"
            class="rounded-2xl px-3.5 py-2 text-xs font-black uppercase tracking-[0.12em] transition max-[639px]:flex-1"
            [class.bg-slate-900]="selectedPeriod === option.value"
            [class.text-white]="selectedPeriod === option.value"
            [class.shadow-[0_14px_30px_rgba(15,23,42,0.18)]]="selectedPeriod === option.value"
            [class.text-slate-500]="selectedPeriod !== option.value"
            [class.hover:bg-slate-100]="selectedPeriod !== option.value"
            [disabled]="isLoading"
            (click)="onPeriodSelect(option.value)"
          >
            {{ option.label }}
          </button>
        }
      </div>
    </div>
  </header>

  @if (isLoading) {
    <div class="grid gap-4 grid-cols-4 max-[1199px]:grid-cols-2 max-[1120px]:grid-cols-1">
      @for (_ of [1, 2, 3, 4]; track $index) {
        <div class="h-[150px] animate-pulse rounded-[28px] bg-white/90"></div>
      }
    </div>
  } @else if (errorMessage) {
    <article
      class="rounded-[28px] border border-slate-200/70 bg-white px-6 py-6 shadow-[0_28px_60px_rgba(15,23,42,0.08)]"
    >
      <h2 class="text-xl font-black text-slate-900">Unable to load finance dashboard</h2>
      <p class="mt-2 text-sm font-semibold text-slate-500">{{ errorMessage }}</p>
    </article>
  } @else {
    <div class="grid gap-6">
      <!-- KPI Cards -->
      <app-finance-kpis [cards]="kpiCards" />

      <!-- Revenue Trend -->
      <app-command-center-chart-card
        [title]="'Revenue Trend'"
        [subtitle]="'Daily revenue movement'"
        [badge]="revenueBadge"
        [config]="revenueTrendChart"
        [height]="400"
        [emptyMessage]="'Revenue data is not available yet.'"
      />

      <!-- HALF WIDTH ROW -->
      <section class="grid gap-6 grid-cols-2 max-[1120px]:grid-cols-1">
        <!-- Revenue by Course -->
        <app-command-center-chart-card
          [title]="'Revenue by Course'"
          [subtitle]="'Top 8 performing courses'"
          [badge]="'By Revenue'"
          [config]="revenueByCourseChart"
          [height]="300"
          [emptyMessage]="'No course revenue data available.'"
        />

        <!-- Payment Status -->
        <app-command-center-chart-card
          [title]="'Payment Status'"
          [subtitle]="'Distribution of all transactions'"
          [config]="paymentStatusChart"
          [height]="300"
          [emptyMessage]="'Payment status data not available.'"
        />
      </section>

      <!-- Recent Transactions -->
      <app-finance-recent-transactions [transactions]="recentTransactions" />
    </div>
  }
</section>
