@if (!isChildRoute) {
  <app-user-directory-navbar
    [placeholder]="placeholder()"
    [(searchValue)]="searchValue"
    (searchChange)="onSearch($event)"
    (addNewUser)="navigateToAddUser()"
  />
  <div class="bg-[#F8FAFC]">
    <div class="flex justify-between w-xl md:w-full bg-white border-slate-400 rounded-lg px-3 py-3">
      <app-users-selector [activeTab]="activeTab()" (activeTabChange)="onTabChange($event)" />
      <div class="flex gap-4">
        <div class="flex gap-4">
          <!-- Status Dropdown -->
          <div class="relative" tabindex="0" (focusout)="closeDropdown()">
            <button
              (click)="updateDropDown()"
              class="flex items-center gap-2 border border-slate-200 rounded-md text-slate-700 text-sm font-semibold px-3 py-1.5 bg-white hover:bg-slate-50 transition-colors"
            >
              Status:
              <span
                class="hover:bg-slate-50"
                [class]="statusSelectorStyles[status().toUpperCase()]"
              >
                {{ status() }}
              </span>
              <svg
                class="w-3 h-3 text-slate-400"
                [class]="dropdownOpen() ? 'rotate-180 transition-all' : ''"
                viewBox="0 0 24 24"
                fill="none"
                stroke="currentColor"
                stroke-width="2.5"
              >
                <path d="M6 9l6 6 6-6" stroke-linecap="round" stroke-linejoin="round" />
              </svg>
            </button>
            @if (dropdownOpen()) {
              <div
                class="absolute top-full left-0 mt-1 w-36 bg-white border border-slate-200 rounded-lg shadow-md z-50 pt-1 overflow-hidden"
              >
                @for (option of statusOptions; track option) {
                  <button
                    (click)="onStatusChange(option)"
                    class="w-full text-left px-4 py-2 text-sm font-medium transition-colors"
                    [class]="statusStyles[option.toUpperCase()]"
                  >
                    {{ option }}
                  </button>
                }
              </div>
            }
          </div>
        </div>

        <!-- Export Data -->
        <button
          class="flex gap-1 items-center border-[0.5px] border-slate-200 text-slate-600 text-sm font-bold rounded-md px-3 py-1 cursor-pointer"
          (click)="exportData()"
        >
          <svg
            width="9"
            height="10"
            viewBox="0 0 9 10"
            fill="none"
            xmlns="http://www.w3.org/2000/svg"
          >
            <path
              d="M8.14844 3.5H5.82422V0H2.32422V3.5H0L4.07422 7.57422L8.14844 3.5ZM3.5 4.67578V1.17578H4.64844V4.67578H5.33203L4.07422 5.93359L2.81641 4.67578H3.5ZM0 8.75H8.14844V9.92578H0V8.75Z"
              fill="#475569"
            />
          </svg>
          EXPORT DATA
        </button>
      </div>
    </div>

    <app-user-table
      [users]="users()"
      [pagination]="pagination()"
      [isLoading]="userManagement.isLoading()"
      (pageChange)="onPageChange($event)"
    />
  </div>
}

<router-outlet />
